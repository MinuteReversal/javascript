<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI图片生成</title>
    <style>
        body { font-family: sans-serif; padding: 2em; background: #f7f7f7; }
        .container { max-width: 400px; margin: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 2em; }
        input, button { font-size: 1em; padding: 0.5em; margin: 0.5em 0; width: 100%; }
        img { display: block; margin: 1em auto; border-radius: 8px; box-shadow: 0 1px 4px #0002; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AI图片生成</h2>
        <input id="promptInput" type="text" placeholder="请输入提示词..." />
        <button onclick="generateImage()">生成图片</button>
        <div id="imgBox"></div>
    </div>
    <script>
        function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) {
                alert('请输入提示词');
                return;
            }
            const encoded = encodeURIComponent(prompt);
            const url = `https://image.pollinations.ai/prompt/${encoded}?height=256&width=256&nologo=true`;
            const imgBox = document.getElementById('imgBox');
            imgBox.innerHTML = `<img src="${url}" width="256" height="256" alt="AI生成图片" />`;
        }
    </script>
</body>
</html>
